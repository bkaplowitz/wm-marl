# Example config for world-marl-train-e2e.
#
#   world-marl-train-e2e --config configs/train_e2e.example.yaml
#
# Keys are the argparse dest names (underscores, not dashes). Any explicit CLI
# flag overrides the value here, e.g.
#
#   world-marl-train-e2e --config configs/train_e2e.example.yaml --wm-fit-steps 5000
#
# An unknown key is a hard error, so typos surface immediately.
algorithm: ippo
substrate: coins
num_envs: 4
rollout_steps: 128
total_env_steps: 100000
eval_episodes: 50
num_runs: 3
seed: 0
prefit_world_model: true
wm_flow_type: transformer
wm_fit_steps: 10000
wm_hidden_dim: 256
wm_integration_steps: 10
