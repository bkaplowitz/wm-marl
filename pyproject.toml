[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "world-marl"
version = "0.1.0"
description = "JaxMARL-style PPO validation on Melting Pot substrates through Shimmy."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
  "jax==0.4.36",
  "jaxlib==0.4.36",
  "jaxmarl[algs]==0.1.0",
  "dm-meltingpot==2.4.0",
  "dmlab2d==1.0.0",
  "shimmy[meltingpot]==2.0.1",
  "flax",
  "distrax",
  "optax",
  "numpy",
  "matplotlib",
  "tqdm",
]

[project.optional-dependencies]
dev = [
  "pre-commit>=4.3",
  "pytest>=8",
  "ruff==0.15.18",
]
cuda12 = [
  "jax[cuda12]==0.4.36",
]

[project.scripts]
world-marl-verify-install = "world_marl.scripts.verify_install:main"
world-marl-train-e2e = "world_marl.scripts.train_e2e:main"
world-marl-train-coin-dynamics = "world_marl.scripts.train_coin_dynamics:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "integration: tests requiring installed Melting Pot/dmlab2d runtime",
]

[tool.ruff]
target-version = "py311"
line-length = 88
indent-width = 4

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
